{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{% block title %}Real Estate{% endblock %}</title>

    <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
    <link href="{% static 'assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">

    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
          rel="stylesheet">

    <link href="{% static 'assets/vendor/select2/css/select2.min.css' %}" rel="stylesheet">

    <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/drift-zoom/drift-basic.css' %}" rel="stylesheet">

    <link href="{% static 'assets/css/main.css' %}?v=2" rel="stylesheet">

</head>

<body class="{% block body_class %}{% endblock %}">

{% include "partials/header.html" %}

{% if messages %}
    <div class="container mt-4">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}

<main class="main my-5">

    {% block content %}{% endblock %}

</main>

{% include "partials/footer.html" %}

<a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i
        class="bi bi-arrow-up-short"></i></a>

<div id="preloader"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="{% static 'assets/vendor/select2/js/select2.min.js' %}"></script>

<script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'assets/vendor/aos/aos.js' %}"></script>
<script src="{% static 'assets/vendor/purecounter/purecounter_vanilla.js' %}"></script>
<script src="{% static 'assets/vendor/glightbox/js/glightbox.min.js' %}"></script>
<script src="{% static 'assets/vendor/swiper/swiper-bundle.min.js' %}"></script>
<script src="{% static 'assets/vendor/drift-zoom/Drift.min.js' %}"></script>

<script src="{% static 'assets/js/main.js' %}"></script>

<script>
    $(document).ready(function () {
        $('select').filter(function () {
            return !$(this).data('select2');
        }).select2({
            minimumResultsForSearch: Infinity,
            width: '100%'
        });

        $('.form-floating').each(function () {
            var $ff = $(this);
            var $s2 = $ff.find('.select2-container');
            if (!$s2.length) return;

            var isHero = $ff.closest('.hero').length > 0;
            var h = isHero ? '56px' : 'calc(3.5rem + 2px)';

            $s2.find('.select2-selection--single').css({
                'height': h,
                'align-items': 'flex-start'
            });
            $s2.find('.select2-selection__rendered').css({
                'padding-top': '1.625rem',
                'padding-bottom': '0.4rem',
                'line-height': '1.25'
            });
            $s2.find('.select2-selection__arrow').css('height', h);
        });
    });
</script>

<script>
    function togglePassword(fieldId, element) {
        const input = document.getElementById(fieldId);
        const icon = element.querySelector("i");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

</body>
</html>
